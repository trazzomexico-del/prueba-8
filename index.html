<script>
console.log("=== INICIANDO DIAGNÓSTICO DE INVENTARIO ===");
const URL_GOOGLE_SHEETS = "https://docs.google.com/spreadsheets/d/1Iffh-VbZUFFYpI5sVI8HQAz6IPgACs_W2sq0iEH4iVo/export?format=csv";

fetch(URL_GOOGLE_SHEETS)
.then(r => r.text())
.then(data => {
    console.log("1. Conexión con Excel: EXITOSA. Filas encontradas:", data.split("\n").length);
    console.log("2. Estado de window.tdvData:", window.tdvData ? "Detectado correctamente" : "NO DETECTADO (Vacío)");
    console.log("3. Estado de window.pano:", window.pano ? "Visor activo" : "Visor NO detectado");
    
    // Buscamos si existen elementos vectoriales directamente en la página
    let vectores = document.querySelectorAll("path, polygon");
    console.log("4. Polígonos SVG encontrados en el HTML:", vectores.length);
})
.catch(e => console.error("ERROR CRÍTICO EN CONEXIÓN:", e));
</script>
