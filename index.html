<script>
// Enlace de exportación CSV directo y seguro
const URL_GOOGLE_SHEETS = "https://docs.google.com/spreadsheets/d/1Iffh-VbZUFFYpI5sVI8HQAz6IPgACs_W2sq0iEH4iVo/edit?usp=sharing";

function inicializarControlInventario() {
    fetch(URL_GOOGLE_SHEETS)
    .then(response => response.text())
    .then(csvText => {
        let filas = csvText.split("\n");
        let mapeo_lotes = {};
        
        filas.forEach(fila => {
            let columnas = fila.split(",");
            if(columnas.length >= 2) {
                let nombreExcel = columnas[0].trim().toLowerCase().replace(/[\s_-]/g, "");
                let estadoExcel = columnas[1].trim().toLowerCase();
                if (nombreExcel) {
                    mapeo_lotes[nombreExcel] = estadoExcel;
                }
            }
        });

        // ========================================================
        // 1. INTERCEPTAR EL OBJETO MAESTRO DE 3DVISTA (tdvData)
        // ========================================================
        if (window.tdvData && window.tdvData.panoramas) {
            window.tdvData.panoramas.forEach(pano => {
                if (pano.hotspots) {
                    pano.hotspots.forEach(hotspot => {
                        let nombre = (hotspot.name || "").toLowerCase().replace(/[\s_-]/g, "");
                        if (mapeo_lotes[nombre]) {
                            let estado = mapeo_lotes[nombre];
                            let color = (estado.includes("vend") || estado.includes("roj")) ? "#FF0000" : "#00FF00";
                            // Inyección directa en propiedades nativas de 3DVista
                            hotspot.fillColor = color;
                            hotspot.lineColor = color;
                            hotspot.fillOpacity = 0.6;
                        }
                    });
                }
            });
        }

        // ========================================================
        // 2. OBLIGAR AL REPRODUCTOR EN VIVO A RE-RENDERIZAR
        // ========================================================
        let intentos = 0;
        let verificadorVivo = setInterval(() => {
            intentos++;
            
            if (window.pano && typeof window.pano.getPanoramas === "function") {
                let panos = window.pano.getPanoramas();
                if (panos && panos.length > 0) {
                    let seModificoPanoActual = false;

                    panos.forEach(p => {
                        let hotspots = typeof p.getHotspots === "function" ? p.getHotspots() : (p.hotspots || []);
                        if (hotspots && hotspots.length > 0) {
                            hotspots.forEach(hotspot => {
                                let nombre = hotspot.name || (hotspot.get ? hotspot.get("name") : "") || hotspot.id || "";
                                let nombreLimpio = nombre.toString().toLowerCase().replace(/[\s_-]/g, "");
                                
                                if (mapeo_lotes[nombreLimpio]) {
                                    let estado = mapeo_lotes[nombreLimpio];
                                    let color = (estado.includes("vend") || estado.includes("roj")) ? "#FF0000" : "#00FF00";
                                    
                                    // Forzamos propiedades en caliente
                                    hotspot.fillColor = color;
                                    hotspot.lineColor = color;
                                    hotspot.fillOpacity = 0.6;
                                    if (hotspot.set) hotspot.set("fillColor", color);
                                    
                                    seModificoPanoActual = true;
                                }
                            });
                        }
                    });

                    // Si alteró el panorama actual, forzamos refresco visual instantáneo del visor
                    if (seModificoPanoActual && typeof window.pano.getCurrentPanoramaName === "function" && typeof window.pano.setPanorama === "function") {
                        let escenaActual = window.pano.getCurrentPanoramaName();
                        window.pano.setPanorama(escenaActual);
                        clearInterval(verificadorVivo); // Detener ciclo para evitar parpadeos
                    }
                }
            }

            if (intentos > 30) {
                clearInterval(verificadorVivo);
            }
        }, 300);

    })
    .catch(error => console.error('Error en enlace Sheets:', error));
}

if (document.readyState === "complete" || document.readyState === "interactive") {
    inicializarControlInventario();
} else {
    window.addEventListener("DOMContentLoaded", inicializarControlInventario);
}
</script>
